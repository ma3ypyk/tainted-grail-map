<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Карта Авалону</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<script src="map-data.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0c0e14;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    -webkit-tap-highlight-color: transparent;
  }
  #wrap {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  svg { width: 100%; height: 100%; touch-action: pan-x pan-y; }

  .edge {
    stroke: #33415a;
    stroke-width: 3;
    stroke-dasharray: 6 5;
  }
  .route-line {
    stroke: #ffffff;
    stroke-width: 4;
    stroke-linecap: round;
  }

  .node-tile {
    fill: #ffffff;
    stroke: #4d6086;
    stroke-width: 2;
    cursor: pointer;
  }
  .node-tile.reachable { stroke: #4d9fff; stroke-width: 3; }
  .node-tile:active { fill: #dfe6f0; }

  .fog-tile {
    fill: #f2f2f2;
    stroke: #9a9a9a;
    stroke-width: 2;
    cursor: pointer;
  }

  .node-label {
    fill: #1c2230;
    font-size: 20px;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
    user-select: none;
  }

  .status-dot { pointer-events: none; }
  .status-dot.empty { fill: none; stroke: #cfd4dc; stroke-width: 1; }
  .dot-dream { fill: #4d9fff; }
  .dot-settlement-hostile { fill: #d64545; }
  .dot-settlement-friendly { fill: #4caf50; }
  .dot-menhir { fill: #c9a227; }
  .dot-action-active { fill: #4caf50; }
  .dot-action-passive { fill: #8a8a8a; }
  .dot-player { fill: #4d9fff; }
  .dot-miniboss { fill: #d64545; }

  /* Картка локації — у стилі оригінальної гри: арка з назвою, стрілки
     сусідів по сторонах, дія знизу, флейвор-текст курсивом. Наразі все на
     плейсхолдер-контенті. */
  #card-overlay {
    position: fixed; inset: 0;
    background: rgba(6, 7, 11, 0.82);
    display: none;
    align-items: center; justify-content: center;
    z-index: 10;
    font-family: 'IM Fell English', serif;
  }
  #card-overlay.open { display: flex; }

  #card {
    width: min(88vw, 360px);
    aspect-ratio: 5 / 7;
    position: relative;
    background: radial-gradient(ellipse at 50% 30%, #4a5a3a 0%, #2c3620 55%, #161d10 100%);
    border: 4px solid #2a2015;
    border-radius: 6px;
    box-shadow: 0 0 0 2px #7a6a3f, 0 10px 30px rgba(0,0,0,0.6);
    color: #e9e0c8;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .card-nav {
    position: absolute;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: #e9e0c8;
    text-shadow: 0 2px 3px rgba(0,0,0,0.8);
    cursor: pointer;
    padding: 4px 8px;
    user-select: none;
  }
  .card-nav.dim { opacity: 0.3; cursor: default; }
  #nav-up    { top: 4%;  left: 50%; transform: translateX(-50%); }
  #nav-down  { bottom: 4%; left: 50%; transform: translateX(-50%); }
  #nav-left  { top: 50%; left: 3%;  transform: translateY(-50%); }
  #nav-right { top: 50%; right: 3%; transform: translateY(-50%); }

  #card-titlebar {
    margin: 15% auto 0;
    width: 78%;
    text-align: center;
    z-index: 2;
  }
  #card-id {
    display: inline-block;
    background: #201a10;
    border: 2px solid #7a6a3f;
    border-radius: 12px;
    padding: 2px 14px;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: #f4d976;
    margin-bottom: 6px;
  }
  #card-name {
    font-family: 'IM Fell English SC', serif;
    font-size: 26px;
    letter-spacing: 1px;
    color: #f3ecd4;
    border-top: 1px solid #7a6a3f;
    border-bottom: 1px solid #7a6a3f;
    padding: 6px 0;
  }

  #card-icons {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 8px;
    z-index: 2;
  }
  #card-icons span {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #201a10;
    border: 2px solid #7a6a3f;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }

  #card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 9% 6%;
    z-index: 2;
  }

  #card-action {
    background: rgba(10, 12, 8, 0.72);
    border: 1px solid #7a6a3f;
    border-radius: 4px;
    padding: 8px 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    line-height: 1.6;
    color: #f4d976;
    margin-bottom: 10px;
  }
  #card-action .cost { color: #8fce6f; }

  #card-status {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: #cfd8e6;
    margin-bottom: 10px;
    line-height: 1.7;
  }

  #card-flavor {
    font-style: italic;
    font-size: 15px;
    color: #cdbf9a;
    text-align: center;
    margin-bottom: 12px;
  }

  #card-btns { display: flex; gap: 10px; }
  #card-btns button {
    flex: 1;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 10px 4px;
    border: 2px solid #7a6a3f;
    border-radius: 4px;
    background: #201a10;
    color: #e9e0c8;
    cursor: pointer;
  }
  #btn-travel { border-color: #6fce85; background: #16321f; }
  #btn-travel:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<div id="wrap"><svg id="map" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg></div>

<div id="card-overlay">
  <div id="card">
    <div class="card-nav" id="nav-up">^</div>
    <div class="card-nav" id="nav-down">v</div>
    <div class="card-nav" id="nav-left">&lt;</div>
    <div class="card-nav" id="nav-right">&gt;</div>

    <div id="card-titlebar">
      <div id="card-id">101</div>
      <div id="card-name">Локація</div>
    </div>
    <div id="card-icons"><span>👁</span><span>⛺</span><span>🕯</span></div>

    <div id="card-body">
      <div id="card-status"></div>
      <div id="card-action"></div>
      <div id="card-flavor"></div>
      <div id="card-btns">
        <button id="btn-back">Назад</button>
        <button id="btn-travel">Подорож</button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const params = new URLSearchParams(location.search);
  const startParam = (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) || params.get("loc");
  const currentLocation = startParam ? parseInt(startParam, 10) : 101;

  const CELL = 120;
  const PAD = 70;
  const TILE = 82;
  const FOG_TILE = 34;

  const cols = Object.values(MAP_GRID).map(p => p[0]);
  const rows = Object.values(MAP_GRID).map(p => p[1]);
  const maxCol = Math.max(...cols), maxRow = Math.max(...rows);
  const width = PAD * 2 + maxCol * CELL;
  const height = PAD * 2 + maxRow * CELL;

  const svg = document.getElementById("map");
  svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

  function pos(id) {
    const [c, r] = MAP_GRID[id];
    return [PAD + c * CELL, PAD + r * CELL];
  }

  const ns = "http://www.w3.org/2000/svg";
  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  // --- Граф сусідства + BFS найкоротший шлях ---
  const adjacency = {};
  MAP_EDGES.forEach(([a, b]) => {
    (adjacency[a] = adjacency[a] || new Set()).add(b);
    (adjacency[b] = adjacency[b] || new Set()).add(a);
  });

  function findPath(start, end) {
    if (start === end) return [start];
    if (!adjacency[start] || !adjacency[end]) return null;
    const visited = new Set([start]);
    const queue = [[start]];
    while (queue.length) {
      const path = queue.shift();
      const node = path[path.length - 1];
      for (const neighbor of adjacency[node] || []) {
        if (neighbor === end) return [...path, neighbor];
        if (!visited.has(neighbor)) {
          visited.add(neighbor);
          queue.push([...path, neighbor]);
        }
      }
    }
    return null;
  }

  const gridToId = {};
  Object.entries(MAP_GRID).forEach(([id, [c, r]]) => { gridToId[c + "," + r] = parseInt(id, 10); });

  function neighborInDirection(id, dc, dr) {
    const [c, r] = MAP_GRID[id];
    return gridToId[(c + dc) + "," + (r + dr)];
  }

  // Ребра (уже прохідні дороги — стіни вирахувані заздалегідь у map-data.js)
  MAP_EDGES.forEach(([a, b]) => {
    if (!MAP_GRID[a] || !MAP_GRID[b]) return;
    const [x1, y1] = pos(a);
    const [x2, y2] = pos(b);
    svg.appendChild(el("line", { class: "edge", x1, y1, x2, y2 }));
  });

  const routeGroup = el("g", { id: "route-group" });
  svg.appendChild(routeGroup);

  const reachable = adjacency[currentLocation] || new Set();

  // Хаб (101) і його периметр 3x3 завжди активні — це безпечна база, ніколи
  // не гасне, навіть коли з'явиться справжня механіка палива.
  const HUB_ID = 101;
  const effectiveActiveMenhirs = new Set(ACTIVE_MENHIRS);
  effectiveActiveMenhirs.add(HUB_ID);

  // Освітлення: кожен активний Менгір освітлює квадрат 3x3 навколо себе
  // (діагоналі теж входять — це зона видимості, а не шлях руху).
  const litIds = new Set();
  effectiveActiveMenhirs.forEach(m => {
    const [mc, mr] = MAP_GRID[m];
    for (let dc = -1; dc <= 1; dc++) {
      for (let dr = -1; dr <= 1; dr++) {
        const nb = gridToId[(mc + dc) + "," + (mr + dr)];
        if (nb !== undefined) litIds.add(nb);
      }
    }
  });

  const DOT_R = TILE * 0.075;

  function statusDot(cx, cy, extraClass) {
    if (!extraClass) return el("circle", { class: "status-dot empty", cx, cy, r: DOT_R });
    return el("circle", { class: "status-dot " + extraClass, cx, cy, r: DOT_R });
  }

  Object.keys(MAP_GRID).forEach(idStr => {
    const id = parseInt(idStr, 10);
    const [x, y] = pos(id);
    const isMenhir = MAP_MENHIRS.has(id);
    const isActiveMenhir = effectiveActiveMenhirs.has(id);
    const isCurrent = id === currentLocation;
    const isFog = isMenhir ? !isActiveMenhir : !litIds.has(id);
    const isDirectNeighbor = reachable.has(id);

    const g = el("g", {});

    if (isFog) {
      // Локації в тумані: менший, порожній квадратик без номера.
      const rect = el("rect", {
        x: x - FOG_TILE / 2, y: y - FOG_TILE / 2, width: FOG_TILE, height: FOG_TILE,
        class: "fog-tile" + (isDirectNeighbor ? " reachable" : ""),
      });
      g.appendChild(rect);
    } else {
      const rect = el("rect", {
        x: x - TILE / 2, y: y - TILE / 2, width: TILE, height: TILE,
        class: "node-tile" + (isDirectNeighbor ? " reachable" : ""),
      });
      g.appendChild(rect);

      // Номер локації — по центру плитки.
      const label = el("text", { class: "node-label", x, y });
      label.textContent = id;
      g.appendChild(label);

      // Верхній ряд: Сон (синій) · Поселення (черв./зел./відсутнє) · Менгір (золотий).
      const topY = y - TILE / 2 + TILE * 0.14;
      const dotXs = [x - TILE * 0.25, x, x + TILE * 0.25];

      g.appendChild(statusDot(dotXs[0], topY, MAP_DREAMS.has(id) ? "dot-dream" : null));

      const settlement = MAP_SETTLEMENTS[id];
      const settlementCls = settlement === "hostile" ? "dot-settlement-hostile"
        : settlement === "friendly" ? "dot-settlement-friendly" : null;
      g.appendChild(statusDot(dotXs[1], topY, settlementCls));

      g.appendChild(statusDot(dotXs[2], topY, isMenhir ? "dot-menhir" : null));

      // Нижній ряд: Дія (зелена/сіра) · Гравець тут (синій) · Міні-бос тут (червоний).
      const botY = y + TILE / 2 - TILE * 0.14;

      const action = MAP_ACTIONS[id];
      const actionCls = action === "active" ? "dot-action-active"
        : action === "passive" ? "dot-action-passive" : null;
      g.appendChild(statusDot(dotXs[0], botY, actionCls));

      g.appendChild(statusDot(dotXs[1], botY, isCurrent ? "dot-player" : null));

      g.appendChild(statusDot(dotXs[2], botY, MAP_MINIBOSS_LOCATION === id ? "dot-miniboss" : null));
    }

    g.addEventListener("click", () => openCard(id));
    svg.appendChild(g);
  });

  function drawRoute(path) {
    routeGroup.innerHTML = "";
    if (!path || path.length < 2) return;
    for (let i = 0; i < path.length - 1; i++) {
      const [x1, y1] = pos(path[i]);
      const [x2, y2] = pos(path[i + 1]);
      routeGroup.appendChild(el("line", { class: "route-line", x1, y1, x2, y2 }));
    }
  }

  // --- Картка локації ---
  const overlay = document.getElementById("card-overlay");
  const cardId = document.getElementById("card-id");
  const cardName = document.getElementById("card-name");
  const cardStatus = document.getElementById("card-status");
  const cardAction = document.getElementById("card-action");
  const cardFlavor = document.getElementById("card-flavor");
  const btnTravel = document.getElementById("btn-travel");
  const btnBack = document.getElementById("btn-back");
  const navEls = {
    up: document.getElementById("nav-up"),
    down: document.getElementById("nav-down"),
    left: document.getElementById("nav-left"),
    right: document.getElementById("nav-right"),
  };

  function openCard(id) {
    const isMenhir = MAP_MENHIRS.has(id);
    const isActiveMenhir = effectiveActiveMenhirs.has(id);
    const isCurrent = id === currentLocation;
    const isFog = isMenhir ? !isActiveMenhir : !litIds.has(id);
    const path = findPath(currentLocation, id);
    const isReachable = path !== null;

    cardId.textContent = id;
    cardName.textContent = MAP_NAMES[id] || ("Локація " + id);

    const statusLines = [];
    if (isMenhir) statusLines.push(isActiveMenhir ? "🔥 Тут горить Менгір" : "💀 Менгір тут згас");
    else if (isFog) statusLines.push("🌫️ Огорнуто Туманом");
    else statusLines.push("☀️ Осяяно сусіднім Менгіром");
    if (isCurrent) statusLines.push("Ти тут зараз.");
    else if (!isReachable) statusLines.push("Шляху звідси немає.");
    else if (path.length > 2) statusLines.push(`Шлях: ${path.length - 1} кроків`);
    cardStatus.innerHTML = statusLines.join("<br>");

    cardAction.innerHTML = '<span class="cost">1⚡</span> Плейсхолдер дії локації';
    cardFlavor.textContent = "«Ще нема опису цього місця в Тумані.»";

    // Стрілки сусідів (за напрямком сітки, як у оригінальній грі)
    const dirs = {
      up: neighborInDirection(id, 0, -1),
      down: neighborInDirection(id, 0, 1),
      left: neighborInDirection(id, -1, 0),
      right: neighborInDirection(id, 1, 0),
    };
    Object.entries(dirs).forEach(([dir, nb]) => {
      const el2 = navEls[dir];
      if (nb === undefined) {
        el2.textContent = "";
        el2.classList.add("dim");
      } else {
        const arrow = { up: "^", down: "v", left: "<", right: ">" }[dir];
        el2.textContent = dir === "left" || dir === "right"
          ? (dir === "left" ? `${arrow} ${nb}` : `${nb} ${arrow}`)
          : `${arrow}\n${nb}`;
        el2.classList.remove("dim");
        el2.onclick = () => openCard(nb);
      }
    });

    btnTravel.disabled = isCurrent || !isReachable;
    btnTravel.textContent = isCurrent ? "Ти тут" : "Подорож";
    btnTravel.onclick = () => {
      if (btnTravel.disabled) return;
      if (tg) {
        tg.sendData(JSON.stringify({ location_id: id }));
        tg.close();
      } else {
        console.log("Обрано локацію:", id, "шлях:", path);
        closeCard();
      }
    };

    drawRoute(isReachable ? path : null);
    overlay.classList.add("open");
  }

  function closeCard() {
    overlay.classList.remove("open");
  }

  btnBack.addEventListener("click", closeCard);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) closeCard(); });
})();
</script>
</body>
</html>
